// ─── PUBLIC BOOKING (unchanged) ───────────────────────────────────────────────
function PublicBooking({onBook,onBack}){
  const [step,setStep]=useState(1);
  const [form,setForm]=useState({name:'',dob:'',phone:'',email:'',address:'',bloodType:'O+',service:'',date:'',time:'09:00',notes:'',dentist:'Dr. Colao'});
  const [done,setDone]=useState(null);
  const s=(k,v)=>setForm(f=>({...f,[k]:v}));
  const submit=()=>{
    const svc=SVCS.find(x=>x.name===form.service);
    const a={...form,id:'A'+uid(),patientId:'P'+uid(),patientName:form.name,status:'pending',fee:svc?svc.fee:0,arrived:false};
    onBook(a,form);setDone(a);
  };
  const Logo=()=>h('div',{className:'pwh'},
    h('div',{className:'pwli'},h('div',{className:'pwlic'},h(Svg,{d:IC.tooth,color:'white',size:24})),h('div',{className:'pwn'},'Cyrabell Dental')),
    h('div',{className:'pwt'},'Your Smile, Our Passion')
  );
  const BackBtn=()=>h('div',{style:{position:'fixed',top:14,right:14,zIndex:10}},
    h('button',{className:'btn bp',onClick:onBack,style:{fontSize:12,padding:'7px 12px'}},'← Back')
  );
  if(done) return h('div',{className:'pw'},h(BackBtn),h(Logo),h('div',{className:'pwc'},
    h('div',{className:'pwsuc'},
      h('div',{className:'pwck'},h(Svg,{d:IC.check,color:'white',size:28})),
      h('h2',{style:{fontFamily:"'Playfair Display',serif",fontSize:20,marginBottom:8}},'Appointment Booked!'),
      h('p',{style:{color:'var(--md)',fontSize:13,marginBottom:18,lineHeight:1.6}},'Our team will confirm shortly.'),
      h('div',{className:'rc',style:{textAlign:'left',marginBottom:16}},
        h('div',{className:'rh'},h('div',{className:'rl'},'🦷 Summary')),
        [['Patient',done.name],['Service',done.service],['Date',done.date],['Time',done.time],['Dentist',done.dentist],['Est. Fee','₱'+p$(done.fee)]].map(([l,v])=>h('div',{key:l,className:'rr'},h('span',{className:'rr-l'},l),h('span',{className:'rr-v'},v)))
      ),
      h('button',{className:'btn bs',style:{width:'100%'},onClick:()=>setDone(null)},'Book Another Appointment')
    )
  ));
  const Steps=()=>h('div',{className:'pws'},
    ['Personal','Service','Review'].map((lbl,i)=>h(Fragment,{key:i},
      h('span',{className:'pwsi '+(step>i+1?'done':step===i+1?'curr':'todo')},(step>i+1?'✓':i+1)+' '+lbl),
      i<2&&h('div',{className:'pwsl'})
    ))
  );
  return h('div',{className:'pw'},h(BackBtn),h(Logo),h('div',{className:'pwc'},h(Steps),
    step===1&&h('div',null,
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:17,fontWeight:700,marginBottom:16}},'Personal Information'),
      h(Field,{label:'Full Name *'},h('input',{value:form.name,onChange:e=>s('name',e.target.value),placeholder:'Juan dela Cruz'})),
      h('div',{className:'fg2'},
        h(Field,{label:'Date of Birth'},h('input',{type:'date',value:form.dob,onChange:e=>s('dob',e.target.value)})),
        h(Field,{label:'Blood Type'},h('select',{value:form.bloodType,onChange:e=>s('bloodType',e.target.value)},BLOOD.map(b=>h('option',{key:b},b))))
      ),
      h('div',{className:'fg2'},
        h(Field,{label:'Phone *'},h('input',{type:'tel',value:form.phone,onChange:e=>s('phone',e.target.value),placeholder:'09XXXXXXXXX'})),
        h(Field,{label:'Email'},h('input',{type:'email',value:form.email,onChange:e=>s('email',e.target.value),placeholder:'email@example.com'}))
      ),
      h(Field,{label:'Address'},h('input',{value:form.address,onChange:e=>s('address',e.target.value),placeholder:'Street, City'})),
      h('button',{className:'btn bp',style:{width:'100%',marginTop:16},onClick:()=>form.name&&form.phone&&setStep(2),disabled:!form.name||!form.phone},'Next →')
    ),
    step===2&&h('div',null,
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:17,fontWeight:700,marginBottom:16}},'Service & Schedule'),
      h('div',{className:'fg',style:{marginBottom:12}},h('label',null,'Select Service *'),h('div',{className:'svcg'},SVCS.map(sv=>h('div',{key:sv.name,className:'svcc'+(form.service===sv.name?' sel':''),onClick:()=>s('service',sv.name)},h('div',{className:'svcn'},sv.name),h('div',{className:'svcf'},'₱'+p$(sv.fee)))))),
      h('div',{className:'fg2'},
        h(Field,{label:'Date *'},h('input',{type:'date',value:form.date,onChange:e=>s('date',e.target.value),min:new Date().toISOString().split('T')[0]})),
        h(Field,{label:'Dentist'},h('select',{value:form.dentist,onChange:e=>s('dentist',e.target.value)},DENTISTS.map(d=>h('option',{key:d},d))))
      ),
      h('div',{className:'fg',style:{marginBottom:12}},h('label',null,'Time'),h('div',{className:'tsg'},TIMES.map(t=>h('button',{key:t,type:'button',className:'tsl'+(form.time===t?' sel':''),onClick:()=>s('time',t)},t)))),
      h(Field,{label:'Notes'},h('textarea',{value:form.notes,onChange:e=>s('notes',e.target.value),placeholder:'Concerns or requests…'})),
      h('div',{style:{display:'flex',gap:10,marginTop:16}},
        h('button',{className:'btn bgh',style:{flex:1},onClick:()=>setStep(1)},'← Back'),
        h('button',{className:'btn bp',style:{flex:2},onClick:()=>form.service&&form.date&&setStep(3),disabled:!form.service||!form.date},'Review →')
      )
    ),
    step===3&&h('div',null,
      h('div',{style:{fontFamily:"'Playfair Display',serif",fontSize:17,fontWeight:700,marginBottom:16}},'Confirm Booking'),
      h('div',{className:'rc',style:{marginBottom:16}},
        h('div',{className:'rh'},h('div',{className:'rl'},'🦷 Cyrabell Dental')),
        [['Patient',form.name],['Phone',form.phone],['Email',form.email||'—'],['Service',form.service],['Date',form.date],['Time',form.time],['Dentist',form.dentist],['Est. Fee','₱'+p$(SVCS.find(x=>x.name===form.service)?SVCS.find(x=>x.name===form.service).fee:0)]].map(([l,v])=>h('div',{key:l,className:'rr'},h('span',{className:'rr-l'},l),h('span',{className:'rr-v'},v)))
      ),
      h('div',{style:{display:'flex',gap:10}},
        h('button',{className:'btn bgh',style:{flex:1},onClick:()=>setStep(2)},'← Back'),
        h('button',{className:'btn bp',style:{flex:2},onClick:submit},'✓ Confirm')
      )
    )
  ));
}

// ADMIN PANEL — only shown when authenticated
// ═══════════════════════════════════════════════════════════════════════════
function AdminPanel({user,onLogout,patients,setPatients,appointments,setAppointments,payments,setPayments,notifications,setNotifications,reminders,setReminders,reminderLog,setReminderLog,addToast,onGoKiosk}){
  const [page,setPage]=useState('dashboard');
  const [sideOpen,setSideOpen]=useState(false);
  const pending=appointments.filter(a=>a.status==='pending').length;
  const today=new Date().toISOString().split('T')[0];
  const dueRemindersCount=reminders.filter(r=>r.active&&r.nextDue<=today).length;
  const arrivedCount = appointments.filter(a=>a.arrived&&a.date===new Date().toISOString().split('T')[0]).length;
  const nav=id=>{setPage(id);setSideOpen(false);};

  const NAV=[
    {id:'dashboard',l:'Dashboard',d:IC.dash,sec:'OVERVIEW'},
    {id:'appointments',l:'Appointments',d:IC.cal,badge:pending||null,sec:'MANAGE'},
    {id:'patients',l:'Patients',d:IC.users},
    {id:'payments',l:'Payments',d:IC.credit},
    {id:'reminders',l:'Reminders',d:IC.repeat,badge:dueRemindersCount||null,sec:'TOOLS'},
    {id:'notifications',l:'Notifications',d:IC.bell},
    {id:'export',l:'Export',d:IC.dl},
    {id:'analytics',l:'Analytics',d:IC.report},
  ];
  const BOT=[
    {id:'dashboard',l:'Home',d:IC.dash},
    {id:'appointments',l:'Visits',d:IC.cal,badge:pending||null},
    {id:'patients',l:'Patients',d:IC.users},
    {id:'payments',l:'Payments',d:IC.credit},
    {id:'notifications',l:'Alerts',d:IC.bell},
  ];
  const TITLES={dashboard:'Dashboard',appointments:'Appointments',patients:'Patients',payments:'Payments',reminders:'Recurring Reminders',notifications:'Notifications',export:'Export',analytics:'Analytics'};
  let lastSec=null;
  const userInitial = (user.name||user.username).charAt(0).toUpperCase();

  const PageContent=()=>{
    if(page==='dashboard')return h(Dashboard,{appointments,patients,payments,onGoKiosk});
    if(page==='appointments')return h(Appointments,{appointments,setAppointments,patients,setNotifications,addToast});
    if(page==='patients')return h(Patients,{patients,setPatients,appointments,payments,addToast});
    if(page==='payments')return h(Payments,{payments,setPayments,patients,addToast});
    if(page==='reminders')return h(Reminders,{reminders,setReminders,reminderLog,setReminderLog,patients,addToast});
    if(page==='notifications')return h(Notifications,{notifications,setNotifications,appointments,addToast});
    if(page==='export')return h(ExportPage,{appointments,patients,payments});
    if(page==='analytics')return h(Analytics,{appointments,payments,patients});
    return null;
  };

  return h(Fragment,null,
    h('div',{className:'sb-ov '+(sideOpen?'show':''),onClick:()=>setSideOpen(false)}),
    h('div',{className:'app'},
      h('div',{className:'sb '+(sideOpen?'open':'')},
        h('div',{className:'sb-logo'},
          h('div',{className:'sb-li'},h(Svg,{d:IC.tooth,color:'white',size:20})),
          h('div',{className:'sb-nm'},'Cyrabell Dental'),
          h('div',{className:'sb-sub'},'Admin Panel')
        ),
        h('nav',{className:'sb-nav'},
          NAV.map(item=>{
            const show=item.sec&&item.sec!==lastSec;
            if(show)lastSec=item.sec;
            return h(Fragment,{key:item.id},
              show&&h('div',{className:'ns'},item.sec),
              h('button',{className:'ni '+(page===item.id?'act':''),onClick:()=>nav(item.id)},
                h(Svg,{d:item.d,size:15}),
                h('span',null,item.l),
                item.badge&&h('span',{className:'nb'},item.badge)
              )
            );
          })
        ),
        h('div',{className:'sb-ft'},
          h('div',{style:{marginBottom:8}},
            h('button',{className:'btn bs',style:{width:'100%',justifyContent:'center',fontSize:12,padding:'7px 12px'},onClick:onGoKiosk},
              h(Svg,{d:IC.globe,size:13}),' Open Kiosk Mode')
          ),
          h('div',{className:'uc',onClick:onLogout,title:'Click to log out'},
            h('div',{className:'ua'},userInitial),
            h('div',null,h('div',{className:'un'},user.name||user.username),h('div',{className:'ur'},user.role)),
            h(Svg,{d:IC.logout,size:13,color:'rgba(255,255,255,.5)'})
          )
        )
      ),
      h('div',{className:'main'},
        h('div',{className:'topbar'},
          h('button',{className:'ham',onClick:()=>setSideOpen(o=>!o)},h(Svg,{d:IC.menu,size:18,color:'var(--md)'})),
          h('div',{className:'tt'},TITLES[page]||'Cyrabell'),
          h('div',{className:'tsr'},h(Svg,{d:IC.search,size:13,color:'var(--lt)'}),h('input',{placeholder:'Search…'})),
          arrivedCount>0&&h('div',{className:'kiosk-arrived-badge',style:{fontSize:11}},'🪑 '+arrivedCount+' in clinic'),
          h('button',{className:'tbb',onClick:onLogout,title:'Log out'},h(Svg,{d:IC.logout,size:15,color:'var(--md)'})),
          h('button',{className:'tbb'},h(Svg,{d:IC.bell,size:15,color:'var(--md)'}),pending>0&&h('span',{className:'nd'}))
        ),
        h('div',{className:'content'},h(PageContent)),
        h('div',{className:'bot-nav'},
          h('div',{className:'bn-wrap'},
            BOT.map(item=>h('button',{key:item.id,className:'bn-item '+(page===item.id?'act':''),onClick:()=>nav(item.id)},
              item.badge&&h('span',{className:'bn-badge'},item.badge),
              h('div',{className:'bn-ic'},h(Svg,{d:item.d,size:18,color:page===item.id?'var(--t)':'var(--lt)'})),
              h('span',{className:'bn-lbl'},item.l)
            )),
            h('button',{className:'bn-item',onClick:()=>setSideOpen(o=>!o)},
              h('div',{className:'bn-ic'},h(Svg,{d:IC.menu,size:18,color:'var(--lt)'})),
              h('span',{className:'bn-lbl'},'More')
            )
          )
        )
      )
    )
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// ROOT APP (gates access)
// ═══════════════════════════════════════════════════════════════════════════
function App(){
  // 'login' | 'admin' | 'kiosk' | 'booking'
  const [view,setView]=useState('login');
  const [user,setUser]=useState(null);
  const [patients,setPatients]=useState(INIT_P);
  const [appointments,setAppointments]=useState(INIT_A);
  const [payments,setPayments]=useState(INIT_PAY);
  const [notifications,setNotifications]=useState(INIT_N);
  const [reminders,setReminders]=useState(INIT_REMINDERS);
  const [reminderLog,setReminderLog]=useState(INIT_REMINDER_LOG);
  const [toasts,setToasts]=useState([]);

  const addToast=(msg,type)=>{
    const id=Date.now()+Math.random();
    setToasts(p=>[...p,{id,message:msg,type:type||'info'}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3500);
  };

  const handleAuth=(authedUser)=>{
    setUser(authedUser);
    setView('admin');
    addToast('Welcome back, '+(authedUser.name||authedUser.username)+'!','success');
  };
  const handleLogout=()=>{
    setUser(null);
    setView('login');
    addToast('Logged out successfully','info');
  };
  const handleBook=(appt,pd)=>{
    setAppointments(p=>[appt,...p]);
    if(!patients.find(p=>p.phone===pd.phone))
      setPatients(p=>[{id:appt.patientId,name:pd.name,dob:pd.dob||'',phone:pd.phone,email:pd.email||'',address:pd.address||'',bloodType:pd.bloodType||'O+',allergies:'',lastVisit:'—',balance:0,teeth:{}},...p]);
    addToast('Booking received from '+pd.name+'!','success');
  };
  const handleCheckIn=(apptId)=>{
    setAppointments(prev=>prev.map(a=>a.id===apptId?{...a,arrived:true}:a));
    addToast('Patient checked in!','success');
  };

  if(view==='login') return h(Fragment,null,
    h(LoginScreen,{
      onAuth:handleAuth,
      onPickKiosk:()=>setView('kiosk'),
      onPublicBooking:()=>setView('booking')
    }),
    h(Toast,{toasts,rm:id=>setToasts(p=>p.filter(t=>t.id!==id))})
  );

  if(view==='kiosk') return h(Fragment,null,
    h(KioskMode,{
      appointments,
      onCheckIn:handleCheckIn,
      onExit:()=>setView(user?'admin':'login'),
      addToast
    }),
    h(Toast,{toasts,rm:id=>setToasts(p=>p.filter(t=>t.id!==id))})
  );

  if(view==='booking') return h(Fragment,null,
    h(PublicBooking,{
      onBook:handleBook,
      onBack:()=>setView('login')
    }),
    h(Toast,{toasts,rm:id=>setToasts(p=>p.filter(t=>t.id!==id))})
  );

  // view === 'admin' — protected
  if(!user){setView('login');return null;}

  return h(Fragment,null,
    h(AdminPanel,{
      user,onLogout:handleLogout,
      patients,setPatients,
      appointments,setAppointments,
      payments,setPayments,
      notifications,setNotifications,
      reminders,setReminders,
      reminderLog,setReminderLog,
      addToast,
      onGoKiosk:()=>setView('kiosk')
    }),
    h(Toast,{toasts,rm:id=>setToasts(p=>p.filter(t=>t.id!==id))})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

</script>
